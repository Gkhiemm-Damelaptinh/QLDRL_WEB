<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Lọc Lớp Theo Khoa</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .debug { background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 3px; }
        select, input { padding: 8px; margin: 5px; width: 200px; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>Test Lọc Lớp Theo Khoa</h1>
    
    <div class="form-section">
        <h3>Test API Lớp Theo Khoa</h3>
        <div>
            <label>Chọn khoa:</label>
            <select id="test-khoa">
                <option value="">Chọn khoa</option>
            </select>
        </div>
        <div>
            <label>Lớp sinh viên:</label>
            <div class="relative">
                <input type="text" id="test-lop-search" class="hidden" placeholder="Tìm kiếm lớp...">
                <select id="test-lop">
                    <option value="">Chọn lớp</option>
                </select>
            </div>
        </div>
        <div>
            <label>Lớp chủ nhiệm:</label>
            <div class="relative">
                <input type="text" id="test-lopcv-search" class="hidden" placeholder="Tìm kiếm lớp...">
                <select id="test-lopcv">
                    <option value="">Chọn lớp chủ nhiệm</option>
                </select>
            </div>
        </div>
        <button onclick="testAPI()">Test API</button>
        <button onclick="clearForm()">Clear Form</button>
    </div>
    
    <div id="debug" class="debug"></div>

    <script>
        const API_BASE = 'http://localhost:5204';
        
        function debugLog(message) {
            const debugDiv = document.getElementById('debug');
            const timestamp = new Date().toLocaleTimeString();
            debugDiv.innerHTML += `<div><strong>[${timestamp}]</strong> ${message}</div>`;
        }
        
        function clearDebug() {
            document.getElementById('debug').innerHTML = '';
        }
        
        function clearForm() {
            document.getElementById('test-khoa').value = '';
            document.getElementById('test-lop').innerHTML = '<option value="">Chọn lớp</option>';
            document.getElementById('test-lopcv').innerHTML = '<option value="">Chọn lớp chủ nhiệm</option>';
            document.getElementById('test-lop-search').style.display = 'none';
            document.getElementById('test-lopcv-search').style.display = 'none';
            debugLog('Form cleared');
        }
        
        async function loadAllLopTest() {
            try {
                const response = await fetch(`${API_BASE}/api/preload`);
                if (response.ok) {
                    const data = await response.json();
                    const lopSelect = document.getElementById('test-lop');
                    const lopCVSelect = document.getElementById('test-lopcv');
                    const lopSearch = document.getElementById('test-lop-search');
                    const lopCVSearch = document.getElementById('test-lopcv-search');
                    
                    const lopOptions = '<option value="">Chọn lớp</option>' +
                        data.lop.map(l => `<option value="${l.MaLop}" data-makh="${l.MaKH}">${l.TenLop} - ${l.TenKhoa || 'N/A'}</option>`).join('');
                    
                    lopSelect.innerHTML = lopOptions;
                    lopCVSelect.innerHTML = lopOptions;
                    
                    if (data.lop.length > 10) {
                        lopSearch.classList.remove('hidden');
                        lopCVSearch.classList.remove('hidden');
                    } else {
                        lopSearch.classList.add('hidden');
                        lopCVSearch.classList.add('hidden');
                    }
                    
                    debugLog('All lớp loaded: ' + data.lop.length + ' items');
                }
            } catch (error) {
                debugLog('Error loading all lớp: ' + error.message);
            }
        }
        
        async function testAPI() {
            debugLog('Testing API functionality...');
            
            try {
                // Load danh sách khoa
                const khoaResponse = await fetch(`${API_BASE}/api/preload`);
                if (khoaResponse.ok) {
                    const data = await khoaResponse.json();
                    const khoaSelect = document.getElementById('test-khoa');
                    khoaSelect.innerHTML = '<option value="">Chọn khoa</option>' +
                        data.khoa.map(k => `<option value="${k.MaKH}">${k.TenKhoa}</option>`).join('');
                    debugLog('Khoa loaded: ' + data.khoa.length + ' items');
                }
                
                // Setup khoa change event
                const khoaSelect = document.getElementById('test-khoa');
                const lopSelect = document.getElementById('test-lop');
                const lopCVSelect = document.getElementById('test-lopcv');
                const lopSearch = document.getElementById('test-lop-search');
                const lopCVSearch = document.getElementById('test-lopcv-search');
                
                khoaSelect.addEventListener('change', async () => {
                    const selectedKhoa = khoaSelect.value;
                    debugLog('Khoa selected: ' + selectedKhoa);
                    
                    if (selectedKhoa) {
                        try {
                            const response = await fetch(`${API_BASE}/api/lop/by-khoa/${selectedKhoa}`);
                            if (response.ok) {
                                const lopData = await response.json();
                                debugLog('Lớp data loaded: ' + lopData.length + ' items');
                                debugLog('Lớp data: ' + JSON.stringify(lopData, null, 2));
                                
                                // Update lớp cho sinh viên
                                const lopOptions = '<option value="">Chọn lớp</option>' +
                                    lopData.map(l => `<option value="${l.maLop}">${l.tenLop}</option>`).join('');
                                lopSelect.innerHTML = lopOptions;
                                
                                // Update lớp chủ nhiệm cho giảng viên
                                const lopCVOptions = '<option value="">Chọn lớp chủ nhiệm</option>' +
                                    lopData.map(l => `<option value="${l.maLop}">${l.tenLop}</option>`).join('');
                                lopCVSelect.innerHTML = lopCVOptions;
                                
                                // Show search input nếu có nhiều lớp (>10)
                                if (lopData.length > 10) {
                                    lopSearch.classList.remove('hidden');
                                    lopCVSearch.classList.remove('hidden');
                                    debugLog('Search inputs shown (many classes)');
                                } else {
                                    lopSearch.classList.add('hidden');
                                    lopCVSearch.classList.add('hidden');
                                }
                                
                                // Setup search functionality
                                setupSearch();
                                
                            } else {
                                debugLog('Error loading lớp: ' + response.status);
                            }
                        } catch (error) {
                            debugLog('Error: ' + error.message);
                        }
                    } else {
                        // Load tất cả lớp khi không chọn khoa
                        loadAllLopTest();
                    }
                });
                
                debugLog('API test setup completed');
                
                // Load tất cả lớp ban đầu
                await loadAllLopTest();
                
            } catch (error) {
                debugLog('Error: ' + error.message);
            }
        }
        
        function setupSearch() {
            const lopSearch = document.getElementById('test-lop-search');
            const lopCVSearch = document.getElementById('test-lopcv-search');
            const lopSelect = document.getElementById('test-lop');
            const lopCVSelect = document.getElementById('test-lopcv');
            
            // Tìm kiếm lớp sinh viên
            lopSearch.addEventListener('input', () => {
                const searchTerm = lopSearch.value.toLowerCase();
                const options = lopSelect.querySelectorAll('option');
                
                options.forEach(option => {
                    if (option.value === '') return;
                    const text = option.textContent.toLowerCase();
                    option.style.display = text.includes(searchTerm) ? 'block' : 'none';
                });
                debugLog('Searching lớp: ' + searchTerm);
            });
            
            // Tìm kiếm lớp chủ nhiệm
            lopCVSearch.addEventListener('input', () => {
                const searchTerm = lopCVSearch.value.toLowerCase();
                const options = lopCVSelect.querySelectorAll('option');
                
                options.forEach(option => {
                    if (option.value === '') return;
                    const text = option.textContent.toLowerCase();
                    option.style.display = text.includes(searchTerm) ? 'block' : 'none';
                });
                debugLog('Searching lớp chủ nhiệm: ' + searchTerm);
            });
        }
    </script>
</body>
</html>
