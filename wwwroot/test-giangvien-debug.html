<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Giảng Viên API</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .debug { background: #f0f0f0; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { padding: 10px 15px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background: #0056b3; }
        pre { background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>Debug Giảng Viên API</h1>
    
    <div>
        <button onclick="testAPI()">Test API Response</button>
        <button onclick="testFillForm()">Test Fill Form</button>
        <button onclick="clearDebug()">Clear Debug</button>
    </div>
    
    <div id="debug" class="debug"></div>
    
    <div style="margin-top: 20px;">
        <h3>Form Fields Test:</h3>
        <div style="margin: 10px 0;">
            <label>Tên giảng viên:</label>
            <input type="text" id="edit-info-ten" style="padding: 5px; margin: 5px; width: 200px;">
        </div>
        <div style="margin: 10px 0;">
            <label>Số điện thoại:</label>
            <input type="text" id="edit-info-sdt" style="padding: 5px; margin: 5px; width: 200px;">
        </div>
        <div style="margin: 10px 0;">
            <label>Email:</label>
            <input type="email" id="edit-info-email" style="padding: 5px; margin: 5px; width: 200px;">
        </div>
        <div style="margin: 10px 0;">
            <label>Khoa:</label>
            <select id="edit-info-khoa" style="padding: 5px; margin: 5px; width: 200px;">
                <option value="">Chọn khoa</option>
                <option value="TTTT">Thông tin - Truyền thông</option>
            </select>
        </div>
        <div style="margin: 10px 0;">
            <label>Lớp chủ nhiệm:</label>
            <select id="edit-info-lopcv" style="padding: 5px; margin: 5px; width: 200px;">
                <option value="">Chọn lớp</option>
                <option value="23T2">B023TT2</option>
            </select>
        </div>
        <div style="margin: 10px 0;">
            <label>Địa chỉ:</label>
            <input type="text" id="edit-info-diachi-gv" style="padding: 5px; margin: 5px; width: 200px;">
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5204';
        
        function debugLog(message) {
            const debugDiv = document.getElementById('debug');
            const timestamp = new Date().toLocaleTimeString();
            debugDiv.innerHTML += `<div><strong>[${timestamp}]</strong> ${message}</div>`;
        }
        
        function clearDebug() {
            document.getElementById('debug').innerHTML = '';
        }
        
        async function testAPI() {
            const maCaNhan = '23092006118';
            debugLog('Testing API for maCaNhan: ' + maCaNhan);
            
            try {
                debugLog('Making API call...');
                const response = await fetch(`${API_BASE}/api/giangvien/${maCaNhan}`);
                
                debugLog(`Response status: ${response.status}`);
                debugLog(`Response headers: ${JSON.stringify(Object.fromEntries(response.headers.entries()))}`);
                
                if (response.ok) {
                    const data = await response.json();
                    debugLog('API Response Data:');
                    debugLog(`<pre>${JSON.stringify(data, null, 2)}</pre>`);
                    
                    // Test field mapping
                    debugLog('Testing field mapping:');
                    const fields = {
                        'edit-info-ten': data.TenGV || '',
                        'edit-info-sdt': data.SDT || '',
                        'edit-info-email': data.Email || '',
                        'edit-info-khoa': data.MaKH || '',
                        'edit-info-lopcv': data.LopCV || '',
                        'edit-info-diachi-gv': data.DiaChi || ''
                    };
                    
                    debugLog('Mapped fields:');
                    debugLog(`<pre>${JSON.stringify(fields, null, 2)}</pre>`);
                    
                } else {
                    const errorText = await response.text();
                    debugLog(`API Error: ${response.status} - ${errorText}`);
                }
            } catch (error) {
                debugLog(`Fetch Error: ${error.message}`);
            }
        }
        
        async function testFillForm() {
            const maCaNhan = '23092006118';
            debugLog('Testing form fill for maCaNhan: ' + maCaNhan);
            
            try {
                const response = await fetch(`${API_BASE}/api/giangvien/${maCaNhan}`);
                
                if (response.ok) {
                    const gvData = await response.json();
                    debugLog('Data received from API:');
                    debugLog(`<pre>${JSON.stringify(gvData, null, 2)}</pre>`);
                    
                    const fields = {
                        'edit-info-ten': gvData.TenGV || '',
                        'edit-info-sdt': gvData.SDT || '',
                        'edit-info-email': gvData.Email || '',
                        'edit-info-khoa': gvData.MaKH || '',
                        'edit-info-lopcv': gvData.LopCV || '',
                        'edit-info-diachi-gv': gvData.DiaChi || ''
                    };
                    
                    debugLog('Attempting to fill form fields:');
                    
                    Object.entries(fields).forEach(([id, value]) => {
                        const field = document.getElementById(id);
                        if (field) {
                            field.value = value;
                            debugLog(`✓ Filled ${id} with value: "${value}"`);
                        } else {
                            debugLog(`✗ Field not found: ${id}`);
                        }
                    });
                    
                    debugLog('Form fill completed!');
                } else {
                    const errorText = await response.text();
                    debugLog(`API Error: ${response.status} - ${errorText}`);
                }
            } catch (error) {
                debugLog(`Error: ${error.message}`);
            }
        }
    </script>
</body>
</html>
